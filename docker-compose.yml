version: '3.8'

networks:
  bg-network:
    driver: bridge

services:
  blue:
    image: flask-bg:blue
    container_name: blue
    environment:
      - APP_VERSION=${BLUE_VERSION:-1.0.0}
      - APP_COLOR=blue
    networks:
      - bg-network

  green:
    image: flask-bg:green
    container_name: green
    environment:
      - APP_VERSION=${GREEN_VERSION:-2.0.0}
      - APP_COLOR=green
    networks:
      - bg-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - bg-network
    depends_on:
      - blue
      - green
